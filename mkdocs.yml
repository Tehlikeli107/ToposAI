site_name: ToposAI
site_description: Neuro-Symbolic AI via Category Theory — Toposes, Yoneda, Sheaves
site_url: https://tehlikeli107.github.io/ToposAI/
repo_url: https://github.com/Tehlikeli107/ToposAI
repo_name: Tehlikeli107/ToposAI

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - API Reference: api.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
