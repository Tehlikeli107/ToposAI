name: ToposAI CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .

    - name: Run pytest (Math & Model Verification)
      run: |
        # Run core mathematics and model tests
        pytest tests/

    - name: Formal Mathematical Verification (Lean 4)
      run: |
        # Install Lean 4 via elan to verify Curry-Howard-Lambek proofs
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        export PATH="$HOME/.elan/bin:$PATH"
        # Test theorem correctness
        lean topos_proof.lean
