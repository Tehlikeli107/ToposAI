name: ToposAI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check topos_ai tests examples

  test:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      - name: Compile source tree
        run: python -m compileall -q topos_ai tests experiments benchmarks

      - name: Run unit and hygiene tests
        run: |
          pytest \
            tests/test_core.py \
            tests/test_models.py \
            tests/test_generation.py \
            tests/test_category_core.py \
            tests/test_core_extensions.py \
            tests/test_formal_category.py \
            tests/test_formal_properties.py \
            tests/test_research_docs.py \
            tests/test_examples.py \
            tests/test_claim_hygiene.py \
            tests/test_runtime.py \
            tests/test_optional_dependencies.py \
            -v --tb=short \
            -m "not cuda and not triton and not slow" \
            --cov=topos_ai --cov-report=term-missing --cov-fail-under=85

      - name: Build documentation
        run: |
          python -m pip install "mkdocs-material<9.7"
          mkdocs build --strict

  package:
    name: Package build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in fresh virtual environment
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import torch
          import topos_ai
          from topos_ai.models import ToposTransformer

          model = ToposTransformer(vocab_size=32, d_model=16, num_layers=1, num_universes=2)
          idx = torch.randint(0, 32, (1, 8))
          logits, _ = model(idx)
          assert logits.shape == (1, 8, 32)

          from topos_ai.formal_category import FiniteCategory, Presheaf, yoneda_density_colimit
          from topos_ai.infinity_categories import nerve_3_skeleton
          from topos_ai.hott import FinitePathGroupoid

          category = FiniteCategory(
              objects=("*",),
              morphisms={"id": ("*", "*")},
              identities={"*": "id"},
              composition={("id", "id"): "id"},
          )
          presheaf = Presheaf(category, sets={"*": {"x"}}, restrictions={"id": {"x": "x"}})
          assert yoneda_density_colimit(presheaf)[0].sets["*"]
          assert nerve_3_skeleton(category).is_inner_kan(max_dimension=3)
          assert FinitePathGroupoid(
              objects=("*",),
              paths={"id": ("*", "*")},
              identities={"*": "id"},
              inverses={"id": "id"},
              composition={("id", "id"): "id"},
          ).validate_groupoid_laws()

          print("wheel smoke passed", topos_ai.__version__)
          PY

      - name: Install wheel without dependencies for formal core
        run: |
          python -m venv .venv-formal
          . .venv-formal/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl
          python - <<'PY'
          import topos_ai
          from topos_ai.formal_category import FiniteCategory, Presheaf, yoneda_density_colimit
          from topos_ai.hott import FinitePathGroupoid
          from topos_ai.infinity_categories import InfinityCategoryLayer, nerve_3_skeleton

          assert hasattr(topos_ai, "formal_category")
          assert hasattr(topos_ai, "hott")
          assert hasattr(topos_ai, "infinity_categories")

          category = FiniteCategory(
              objects=("*",),
              morphisms={"id": ("*", "*")},
              identities={"*": "id"},
              composition={("id", "id"): "id"},
          )
          presheaf = Presheaf(category, sets={"*": {"x"}}, restrictions={"id": {"x": "x"}})
          assert yoneda_density_colimit(presheaf)[0].sets["*"]
          assert nerve_3_skeleton(category).is_inner_kan(max_dimension=3)
          assert FinitePathGroupoid(
              objects=("*",),
              paths={"id": ("*", "*")},
              identities={"*": "id"},
              inverses={"id": "id"},
              composition={("id", "id"): "id"},
          ).validate_groupoid_laws()
          try:
              InfinityCategoryLayer(1, 1, 1)
          except RuntimeError as exc:
              assert "requires PyTorch" in str(exc)
          else:
              raise AssertionError("InfinityCategoryLayer should require PyTorch in no-deps formal smoke.")

          print("formal no-deps wheel smoke passed", topos_ai.__version__)
          PY

  lean-verify:
    name: Lean 4 Proof Check
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to main, not every PR (Lean install is slow)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Cache Lean / elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-v1

      - name: Install Lean 4 via elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:stable
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify Topos proof
        run: lean topos_proof.lean
