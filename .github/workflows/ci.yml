name: ToposAI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (core library only)
        run: ruff check topos_ai/

  test:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      - name: Run core unit tests
        run: |
          pytest tests/test_core.py tests/test_models.py tests/test_generation.py \
            -v --tb=short \
            -m "not cuda and not triton and not slow" \
            --cov=topos_ai --cov-report=term-missing

  lean-verify:
    name: Lean 4 Proof Check
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to main, not every PR (Lean install is slow)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Cache Lean / elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-v1

      - name: Install Lean 4 via elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:stable
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify Topos proof
        run: lean topos_proof.lean
