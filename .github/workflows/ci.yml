name: ToposAI CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest torch triton networkx matplotlib numpy
        pip install -e .
        
    - name: Run pytest (Math & Model Verification)
      run: |
        # Sadece temel matematik/model testlerini çalıştır (CI sunucusunda GPU olmayabilir)
        pytest tests/
